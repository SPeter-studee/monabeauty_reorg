<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mona Studio — reorganizáció</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root { --bg: #140c0a; --gold: #c9a86c; --cream: #f3ebe1; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--cream); margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    .box { max-width: 36rem; text-align: center; line-height: 1.6; }
    h1 { color: var(--gold); font-size: 1.25rem; font-weight: 600; margin: 0 0 0.75rem; }
    p { margin: 0 0 1rem; opacity: 0.9; font-size: 0.95rem; }
    code { font-size: 0.85rem; opacity: 0.85; }
    a { color: var(--gold); }
  </style>
</head>
<body>
  <div class="box">
    <h1>monabeauty_reorg</h1>
    <p>Új, tiszta projektváz. Statikus tartalom itt; API a <code>functions/api/</code> alatt.</p>
    <p><a href="/api/health">GET /api/health</a> — ellenőrzés</p>
  </div>
</body>
</html>
