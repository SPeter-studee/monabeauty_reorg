# wrangler.toml
name = "monabeauty2"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ── D1 adatbázis ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "monastudio-v2-db"
database_id = "7b7e5aa5-b54f-4c17-94ab-ed0dedbf33d6"

# ── KV namespace (cache, OAuth state) ─────────────────────────────────────────
[[kv_namespaces]]
binding = "CONTENT"
id = "b2da4e4639ec4141a4f0c91ab3c5e8b7"

# ── R2 bucket (termék képek) ─────────────────────────────────────────────────
[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "mona-products-v2"

# ── Környezet változók (titkos kulcsok) — Cloudflare dashboardon kell beállítani ──
# Settings → Environment Variables → Production + Preview scope:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   RESEND_API_KEY
#   MAILCHIMP_API_KEY
#   MAILCHIMP_AUDIENCE_ID
#   MAILCHIMP_SERVER
#   FOXPOST_USERNAME
#   FOXPOST_PASSWORD
#   FOXPOST_API_KEY
#   SETMORE_REFRESH_TOKEN
#   ANTHROPIC_API_KEY
#   DEEPL_API_KEY
