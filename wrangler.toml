# Pages + Functions — binding neveknek egyezniük kell a kóddal: DB, CONTENT, CHAT_RATE_LIMIT
# Ugyanaz a KV / D1, mint a legacy monabeuty → tartalom és értékelések közös.
# Ha inkább az új D1-et használod (pl. monastudio-v2-db): Workers → D1 → másold a database_id-t ide.
name = "monabeauty2"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "monabeauty-reviews"
database_id = "eb4ce880-25b9-40ea-bf3c-4994f06b91ab"

[[kv_namespaces]]
binding = "CONTENT"
id = "b2da4e4639ec4141a4f0c91ab3c5e8b7"

[[kv_namespaces]]
binding = "CHAT_RATE_LIMIT"
id = "61819ea9400643d3bbec66cd5c23c7e2"
