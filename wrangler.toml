# wrangler.toml — Mona Studio V2
name = "monabeauty2"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ── D1 adatbázis ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "monastudio-v2-db"
database_id = "7b7e5aa5-b54f-4c17-94ab-ed0dedbf33d6"

# ── KV namespace (cache, OAuth state, sessions) ───────────────────────────────
[[kv_namespaces]]
binding = "CONTENT"
id = "b2da4e4639ec4141a4f0c91ab3c5e8b7"

# ── R2 bucket (termék képek) ─────────────────────────────────────────────────
[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "mona-products-v2"

# ── Változók (NEM titkos) ─────────────────────────────────────────────────────
# Production scope-ban felülírható a Cloudflare dashboardról.
[vars]
# Sprint 3 — Webshop / szállítás
SHIPPING_FOXPOST_FT = "1990"
SHIPPING_PERSONAL_FT = "0"
SHIPPING_FREE_THRESHOLD_FT = "20000"
ORDER_NOTIFICATION_EMAIL = "mona@monastudio.hu"

# ── Környezet változók (titkos kulcsok) ──────────────────────────────────────
# Cloudflare dashboardon kell beállítani:
# Settings → Environment Variables → Production + Preview scope:
#
# Sprint 4 (auth):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   FACEBOOK_APP_ID         (új — Sprint 2B 6. kör)
#   FACEBOOK_APP_SECRET     (új — Sprint 2B 6. kör)
#
# Sprint 2A (email + newsletter):
#   RESEND_API_KEY
#   MAILCHIMP_API_KEY
#   MAILCHIMP_AUDIENCE_ID
#   MAILCHIMP_SERVER
#
# Sprint 6 (integrációk):
#   FOXPOST_USERNAME
#   FOXPOST_PASSWORD
#   FOXPOST_API_KEY
#   SETMORE_REFRESH_TOKEN
#   ANTHROPIC_API_KEY
#   DEEPL_API_KEY
